name: Markdown Lint

on:
  push:
    paths:
      - '**/*.md'
    branches:
      - develop
  pull_request:
    branches:
      - develop
    paths:
      - '**/*.md'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nosborn/github-action-markdown-cli@v3.5.0
        with:
          files: '**/*.md'
          config_file: '.markdownlintrc'
